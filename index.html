<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Mahasiswa</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Schabo Condensed -->
    <link href="https://fonts.cdnfonts.com/css/schabo-condensed" rel="stylesheet">
</head>

<body>

<h1 class="judul">Data Mahasiswa</h1>

<div class="container">

    <!-- FORM INPUT -->
    <div class="form">
        <input type="text" id="nim" placeholder="NIM">
        <input type="text" id="nama" placeholder="Nama">
        <input type="text" id="jurusan" placeholder="Jurusan">
        <input type="number" id="ipk" placeholder="IPK" step="0.01">
        <button onclick="tambahMahasiswa()">Tambah Data</button>
    </div>

    <!-- PENCARIAN -->
    <input type="text" id="search" placeholder="🔍Cari Nama / NIM..." onkeyup="searchData()">

    <!-- TABEL -->
    <table id="tabelMahasiswa">
        <thead>
            <tr>
                <th onclick="sortTable(0)">NIM</th>
                <th onclick="sortTable(1)">Nama</th>
                <th onclick="sortTable(2)">Jurusan</th>
                <th onclick="sortTable(3)">IPK</th>
            </tr>
        </thead>
        <tbody id="tbody">
        </tbody>
    </table>

</div>

<script src="script.js"></script>

</body>
</html>
